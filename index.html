<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        const savedTheme = localStorage.getItem('vistrow-theme') || 
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
      })();
    </script>
    <meta
      name="description"
      content="Vistrow builds intelligent growth systems through digital marketing, CRM, AI calling, SaaS products, automation workflows, and analytics for modern businesses."
    />
    <meta name="theme-color" content="#FAF7F0" />
    <title>Vistrow Technologies | AI, SaaS & Growth Systems</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
